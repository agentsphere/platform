name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo clippy --all-features -- -D warnings

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo nextest run --lib --profile ci --no-tests=pass

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://platform:dev@localhost:5432/platform_test
      VALKEY_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo nextest run --test '*_integration' --profile ci --no-tests=pass

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-unit]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - run: mkdir -p ui/dist && touch ui/dist/index.html

      - name: Unit coverage
        run: cargo llvm-cov nextest --lib --lcov --output-path coverage-unit.lcov --ignore-filename-regex '(proto\.rs|ui\.rs)'

      - name: Integration coverage
        run: cargo llvm-cov nextest --test '*_integration' --lcov --output-path coverage-integration.lcov --ignore-filename-regex '(proto\.rs|ui\.rs)'
        env:
          DATABASE_URL: postgres://platform:dev@localhost:5432/platform_test
          VALKEY_URL: redis://localhost:6379

      - name: Upload unit coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage-unit.lcov
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload integration coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage-integration.lcov
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [fmt, lint, test-unit, test-integration, deny]
    strategy:
      matrix:
        include:
          - runner: platform-amd64
            arch: amd64
          - runner: platform-arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.arch }}
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo build --release
