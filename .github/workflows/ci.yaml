name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo clippy --all-features -- -D warnings

  test-unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: taiki-e/install-action@2a622d16d926f7a79275fe00a1d5ac0013dd3d39  # nextest
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo nextest run --lib --profile ci --no-tests=pass

  test-integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: taiki-e/install-action@2a622d16d926f7a79275fe00a1d5ac0013dd3d39  # nextest

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1
        with:
          cluster_name: platform
          config: hack/kind-config.yaml

      - run: mkdir -p ui/dist && touch ui/dist/index.html

      - name: Run integration tests
        run: bash hack/test-in-cluster.sh --filter '*_integration'

  test-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: taiki-e/install-action@2a622d16d926f7a79275fe00a1d5ac0013dd3d39  # nextest

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1
        with:
          cluster_name: platform
          config: hack/kind-config.yaml

      - name: Prepare shared mount
        run: |
          mkdir -p /tmp/platform-e2e
          docker exec platform-control-plane mkdir -p /tmp/platform-e2e

      - run: mkdir -p ui/dist && touch ui/dist/index.html

      - name: Run E2E tests
        run: bash hack/test-in-cluster.sh --type e2e

  deny:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979  # v2

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [test-unit]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: taiki-e/install-action@2a622d16d926f7a79275fe00a1d5ac0013dd3d39  # cargo-llvm-cov
      - uses: taiki-e/install-action@2a622d16d926f7a79275fe00a1d5ac0013dd3d39  # nextest

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1
        with:
          cluster_name: platform
          config: hack/kind-config.yaml

      - run: mkdir -p ui/dist && touch ui/dist/index.html

      - name: Unit coverage
        run: cargo llvm-cov nextest --lib --lcov --output-path coverage-unit.lcov --ignore-filename-regex '(proto\.rs|ui\.rs)'

      - name: Integration coverage
        run: bash hack/test-in-cluster.sh --filter '*_integration' --coverage --lcov coverage-integration.lcov

      - name: Upload unit coverage
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v5
        with:
          files: coverage-unit.lcov
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload integration coverage
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v5
        with:
          files: coverage-integration.lcov
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [fmt, lint, test-unit, test-integration, test-e2e, deny]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: platform-amd64
            arch: amd64
          - runner: platform-arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          shared-key: build-${{ matrix.arch }}
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo build --release
