fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: '^(src/git/templates/|helm/|src/onboarding/templates/)'
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: inject-mermaid
        name: inject mermaid diagrams
        language: script
        entry: hack/inject-mermaid.sh
        files: '(docs/arc42/.*\.md|docs/arc42/diagrams/.*\.mmd)$'
        pass_filenames: false

      - id: rust-fmt
        name: rustfmt
        language: system
        entry: cargo fmt --check
        types: [rust]
        pass_filenames: false

      - id: rust-clippy
        name: clippy
        language: system
        entry: cargo clippy --all-features -- -D warnings
        types: [rust]
        pass_filenames: false
