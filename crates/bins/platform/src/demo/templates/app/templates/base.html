<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Shop{% endblock %} — Platform Demo</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 text-gray-100 min-h-screen">
    <nav class="border-b border-gray-700 bg-gray-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">
                Platform Shop
            </a>
            <div class="flex items-center gap-6">
                <a href="/" class="text-sm text-gray-300 hover:text-white transition">Catalog</a>
                <a href="/cart" class="text-sm text-gray-300 hover:text-white transition relative">
                    Cart
                    <span id="cart-count" class="ml-1 bg-blue-500 text-white text-xs rounded-full px-1.5 py-0.5 {% if not cart_count %}hidden{% endif %}">{{ cart_count or '' }}</span>
                </a>
                <a href="/orders" class="text-sm text-gray-300 hover:text-white transition">Orders</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-gray-700 mt-12 py-6 text-center text-gray-500 text-sm">
        Built with FastAPI + HTMX &middot; Platform Demo
    </footer>
</body>
</html>
