{% extends "base.html" %}
{% block title %}{{ product.name }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <a href="/" class="text-blue-400 hover:text-blue-300 text-sm mb-4 inline-block">&larr; Back to catalog</a>

    <div class="bg-gray-800 rounded-xl border border-gray-700 p-8">
        <span class="text-xs uppercase tracking-wider text-gray-500">{{ product.category }}</span>
        <h1 class="text-3xl font-bold mt-1 mb-4">{{ product.name }}</h1>
        <p class="text-gray-300 mb-6 leading-relaxed">{{ product.description }}</p>

        <div class="flex items-center justify-between border-t border-gray-700 pt-6">
            <div>
                <span class="text-3xl font-bold text-blue-400">${{ "%.2f" | format(product.price_cents / 100) }}</span>
                <span class="text-sm text-gray-500 ml-2">{{ product.stock }} in stock</span>
            </div>
            <form hx-post="/cart/add" hx-swap="none">
                <input type="hidden" name="product_id" value="{{ product.id }}" />
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg transition active:scale-95 font-medium">
                    Add to Cart
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
