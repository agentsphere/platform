apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-app-v0-2
spec:
  replicas: {{ values.replicas | default(1) }}
  selector:
    matchLabels:
      app: {{ project_name }}-app
      version: v0-2
  template:
    metadata:
      labels:
        app: {{ project_name }}-app
        version: v0-2
    spec:
      imagePullSecrets:
        - name: platform-registry-pull
      containers:
        - name: app
          image: {{ image_ref }}
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: value
            - name: CACHE_URL
              valueFrom:
                secretKeyRef:
                  name: valkey-url
                  key: value
            - name: APP_VERSION
              value: "0.2.0"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ project_name }}-app-v0-2
  labels:
    platform.io/component: iframe-preview
spec:
  selector:
    app: {{ project_name }}-app
    version: v0-2
  ports:
    - name: iframe
      port: 8080
      targetPort: 8080
