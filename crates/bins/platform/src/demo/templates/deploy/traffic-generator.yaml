apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ project_name }}-traffic-gen-script
data:
  traffic.py: |
    """Traffic generator with OpenTelemetry distributed tracing."""
    import os, time, random, logging

    import requests
    from opentelemetry import trace
    from opentelemetry.sdk.trace import TracerProvider
    from opentelemetry.sdk.trace.export import BatchSpanProcessor
    from opentelemetry.exporter.otlp.proto.http.trace_exporter import OTLPSpanExporter
    from opentelemetry.sdk.resources import Resource
    from opentelemetry.instrumentation.requests import RequestsInstrumentor

    resource = Resource.create()
    tp = TracerProvider(resource=resource)
    tp.add_span_processor(BatchSpanProcessor(OTLPSpanExporter()))
    trace.set_tracer_provider(tp)
    RequestsInstrumentor().instrument()

    tracer = trace.get_tracer("traffic-gen")
    logging.basicConfig(level=logging.INFO)
    log = logging.getLogger("traffic-gen")

    V1 = "http://{{ project_name }}-app-v0-1:8080"
    V2 = "http://{{ project_name }}-app-v0-2:8080"
    GATEWAY = os.getenv("GATEWAY_URL", "")
    PATHS = ["/healthz", "/", "/product/1", "/product/2", "/product/3"]

    log.info("Traffic generator starting, waiting for services...")
    time.sleep(15)

    while True:
        base = random.choice([V1, V2])
        path = random.choice(PATHS)
        url = f"{base}{path}"
        try:
            r = requests.get(url, timeout=5)
            log.info("GET %s -> %d", url, r.status_code)
        except Exception as e:
            log.warning("GET %s failed: %s", url, e)
        if GATEWAY:
            try:
                requests.get(f"{GATEWAY}{random.choice(PATHS)}", timeout=5)
            except Exception:
                pass
        time.sleep(random.uniform(1, 3))
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-traffic-gen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ project_name }}-traffic-gen
  template:
    metadata:
      labels:
        app: {{ project_name }}-traffic-gen
    spec:
      initContainers:
        - name: install-deps
          image: python:3.12-alpine
          command: ["pip", "install", "--target=/deps",
            "requests", "opentelemetry-sdk",
            "opentelemetry-exporter-otlp-proto-http",
            "opentelemetry-instrumentation-requests"]
          volumeMounts:
            - name: deps
              mountPath: /deps
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: traffic-gen
          image: python:3.12-alpine
          command: ["python", "/scripts/traffic.py"]
          env:
            - name: PYTHONPATH
              value: /deps
            - name: GATEWAY_URL
              value: "{{ gateway_url | default('') }}"
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: deps
              mountPath: /deps
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: script
          configMap:
            name: {{ project_name }}-traffic-gen-script
        - name: deps
          emptyDir: {}
