apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ project_name }}-db
  template:
    metadata:
      labels:
        app: {{ project_name }}-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              value: changeme
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ project_name }}-db
spec:
  selector:
    app: {{ project_name }}-db
  ports:
    - port: 5432
      targetPort: 5432
