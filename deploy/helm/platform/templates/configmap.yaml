apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
data:
  # --- Core ---
  PLATFORM_LISTEN: "0.0.0.0:8080"
  PLATFORM_LOG: {{ .Values.platform.env.logLevel | quote }}
  PLATFORM_DEV: {{ .Values.platform.env.devMode | quote }}
  PLATFORM_SECURE_COOKIES: {{ if .Values.ingress.enabled }}"true"{{ else }}{{ .Values.platform.env.secureCookies | quote }}{{ end }}
  PLATFORM_TRUST_PROXY: {{ if .Values.ingress.enabled }}"true"{{ else }}{{ .Values.platform.env.trustProxy | quote }}{{ end }}
  PLATFORM_PERMISSION_CACHE_TTL: {{ .Values.platform.env.permissionCacheTtl | quote }}
  PLATFORM_SELF_OBSERVE_LEVEL: {{ .Values.platform.env.selfObserveLevel | quote }}

  # --- K8s namespaces ---
  PLATFORM_NAMESPACE: {{ .Release.Namespace | quote }}
  PLATFORM_PIPELINE_NAMESPACE: {{ printf "%s-pipelines" .Release.Namespace | quote }}
  PLATFORM_AGENT_NAMESPACE: {{ printf "%s-agents" .Release.Namespace | quote }}

  # --- Internal service URL (for agent/pipeline pods to reach platform) ---
  PLATFORM_API_URL: "http://{{ include "platform.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:8080"

  # --- Data store connection strings (non-secret parts) ---
  VALKEY_URL: {{ include "platform.valkeyUrl" . | quote }}
  MINIO_ENDPOINT: {{ include "platform.minioEndpoint" . | quote }}

  # --- Pipeline / Agent ---
  PLATFORM_PIPELINE_MAX_PARALLEL: {{ .Values.platform.env.pipelineMaxParallel | quote }}
  PLATFORM_MAX_CLI_SUBPROCESSES: {{ .Values.platform.env.maxCliSubprocesses | quote }}
  PLATFORM_SESSION_IDLE_TIMEOUT: {{ .Values.platform.env.sessionIdleTimeout | quote }}
  PLATFORM_HEALTH_CHECK_INTERVAL: {{ .Values.platform.env.healthCheckInterval | quote }}
  PLATFORM_CLAUDE_CLI_VERSION: {{ .Values.platform.env.claudeCliVersion | quote }}
  PLATFORM_CLI_SPAWN_ENABLED: "true"

  # --- Storage paths (inside container) ---
  PLATFORM_GIT_REPOS_PATH: "/data/repos"
  PLATFORM_OPS_REPOS_PATH: "/data/ops-repos"
  PLATFORM_AGENT_RUNNER_DIR: "/data/agent-runner"
  PLATFORM_MCP_SERVERS_TARBALL: "/data/mcp-servers.tar.gz"
  PLATFORM_SEED_IMAGES_PATH: "/data/seed-images"
  PLATFORM_SEED_COMMANDS_PATH: "/data/seed-commands"
  PLATFORM_SSH_HOST_KEY_PATH: "/data/ssh_host_ed25519_key"

  # --- Gateway API ---
  {{- if .Values.platform.gateway.name }}
  PLATFORM_GATEWAY_NAME: {{ .Values.platform.gateway.name | quote }}
  {{- end }}
  {{- if .Values.platform.gateway.namespace }}
  PLATFORM_GATEWAY_NAMESPACE: {{ .Values.platform.gateway.namespace | quote }}
  {{- end }}

  # --- Valkey agent host ---
  {{- if .Values.platform.valkeyAgentHost }}
  PLATFORM_VALKEY_AGENT_HOST: {{ .Values.platform.valkeyAgentHost | quote }}
  {{- else if .Values.valkey.enabled }}
  PLATFORM_VALKEY_AGENT_HOST: {{ printf "%s-valkey-master:6379" .Release.Name | quote }}
  {{- end }}

  # --- CORS ---
  {{- if .Values.ingress.enabled }}
  {{- $origins := list }}
  {{- range .Values.ingress.hosts }}
  {{- if $.Values.ingress.tls }}
  {{- $origins = append $origins (printf "https://%s" .host) }}
  {{- else }}
  {{- $origins = append $origins (printf "http://%s" .host) }}
  {{- end }}
  {{- end }}
  PLATFORM_CORS_ORIGINS: {{ join "," $origins | quote }}
  {{- else }}
  PLATFORM_CORS_ORIGINS: ""
  {{- end }}

  # --- WebAuthn ---
  WEBAUTHN_RP_ID: {{ include "platform.webauthnRpId" . | quote }}
  WEBAUTHN_RP_ORIGIN: {{ include "platform.webauthnRpOrigin" . | quote }}
  WEBAUTHN_RP_NAME: {{ .Values.platform.webauthn.rpName | quote }}

  # --- SSH ---
  {{- if .Values.platform.ssh.enabled }}
  PLATFORM_SSH_LISTEN: "0.0.0.0:{{ .Values.platform.ssh.port }}"
  {{- end }}

  # --- Container registry ---
  {{- if .Values.platform.registry.url }}
  PLATFORM_REGISTRY_URL: {{ .Values.platform.registry.url | quote }}
  {{- end }}
  {{- if .Values.platform.registry.nodeUrl }}
  PLATFORM_REGISTRY_NODE_URL: {{ .Values.platform.registry.nodeUrl | quote }}
  {{- end }}

  # --- SMTP ---
  {{- if .Values.platform.smtp.host }}
  PLATFORM_SMTP_HOST: {{ .Values.platform.smtp.host | quote }}
  PLATFORM_SMTP_PORT: {{ .Values.platform.smtp.port | quote }}
  PLATFORM_SMTP_FROM: {{ .Values.platform.smtp.from | quote }}
  {{- if .Values.platform.smtp.username }}
  PLATFORM_SMTP_USERNAME: {{ .Values.platform.smtp.username | quote }}
  {{- end }}
  {{- end }}
