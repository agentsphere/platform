# =============================================================================
# Medium deployment — moderate team usage
# Usage: helm install platform ./helm/platform -f helm/platform/values-medium.yaml
# =============================================================================

platform:
  replicaCount: 1
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "4Gi"
      cpu: "2"
  env:
    pipelineMaxParallel: 4
    maxCliSubprocesses: 20

postgresql:
  primary:
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1"
    persistence:
      size: 20Gi

valkey:
  master:
    resources:
      requests:
        memory: "128Mi"
        cpu: "250m"
      limits:
        memory: "256Mi"
        cpu: "500m"
    persistence:
      size: 2Gi

minio:
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    size: 50Gi
