apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-k8s-watcher
  labels:
    app: platform-k8s-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-k8s-watcher
  template:
    metadata:
      labels:
        app: platform-k8s-watcher
    spec:
      serviceAccountName: platform-k8s-watcher
      containers:
        - name: k8s-watcher
          image: platform:dev
          command: ["/platform-k8s-watcher"]
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: INGEST_ENDPOINT
              value: "http://platform-ingest:8081"
            - name: INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: otel-system-token
                  key: token
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
