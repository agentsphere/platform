# Namespaces for agent pods and pipeline pods
apiVersion: v1
kind: Namespace
metadata:
  name: platform-agents
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform-pipelines
---
# ServiceAccount for the platform deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform
  namespace: platform
---
# Role: manage pods in platform-agents namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-agent-manager
  namespace: platform-agents
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/attach", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-agent-manager
  namespace: platform-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-agent-manager
subjects:
  - kind: ServiceAccount
    name: platform
    namespace: platform
---
# Dedicated service account for the K8s watcher (read-only cluster-wide)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-k8s-watcher
  namespace: platform
---
# ClusterRole: read-only pods + deployments in all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-k8s-watcher
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-k8s-watcher
subjects:
  - kind: ServiceAccount
    name: platform-k8s-watcher
    namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-k8s-watcher
---
# Role: manage pods in platform-pipelines namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-pipeline-manager
  namespace: platform-pipelines
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/attach", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-pipeline-manager
  namespace: platform-pipelines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-pipeline-manager
subjects:
  - kind: ServiceAccount
    name: platform
    namespace: platform
