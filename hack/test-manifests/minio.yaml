# Lightweight MinIO for per-run test namespaces.
# Bucket creation handled by deploy-services.sh (mc mb).
# S55: TLS enabled via self-signed certs (same pattern as postgres.yaml).
# Process-wrapper proxy provides metrics scraping + log capture.
apiVersion: v1
kind: Pod
metadata:
  name: minio
  labels:
    app: minio
spec:
  securityContext:
    fsGroup: 1000
  initContainers:
    - name: gen-certs
      image: postgres:16-alpine
      command: ["sh", "-c"]
      args:
        - |
          set -e
          apk add --no-cache openssl
          mkdir -p /certs/CAs
          openssl req -new -x509 -days 3650 -nodes \
            -subj "/CN=minio" \
            -keyout /certs/private.key -out /certs/public.crt
          cp /certs/public.crt /certs/CAs/public.crt
          chmod 644 /certs/public.crt /certs/CAs/public.crt
          chmod 600 /certs/private.key
      volumeMounts:
        - name: certs
          mountPath: /certs
  containers:
    - name: minio
      image: quay.io/minio/minio:RELEASE.2025-02-28T09-55-16Z
      command: ["/proxy/platform-proxy"]
      args:
        - "--wrap"
        - "--scrape-url=https://localhost:9000/minio/v2/metrics/cluster"
        - "--scrape-tls-insecure"
        - "--"
        - "minio"
        - "server"
        - "/data"
        - "--certs-dir"
        - "/certs"
      env:
        - name: MINIO_ROOT_USER
          value: platform
        - name: MINIO_ROOT_PASSWORD
          value: devdevdev
        - name: PLATFORM_API_URL
          value: "__PLATFORM_API_URL__"
        - name: PLATFORM_API_TOKEN
          value: "plat_api_otel_system_dev_000000000000000000000000000000"
        - name: PLATFORM_SERVICE_NAME
          value: platform-minio
        - name: PROXY_HEALTH_PORT
          value: "15020"
      ports:
        - containerPort: 9000
        - containerPort: 15020
      readinessProbe:
        httpGet:
          path: /readyz
          port: 15020
        initialDelaySeconds: 2
        periodSeconds: 1
      volumeMounts:
        - name: certs
          mountPath: /certs
          readOnly: true
        - name: proxy
          mountPath: /proxy
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 160Mi
        limits:
          memory: 544Mi
  volumes:
    - name: certs
      emptyDir: {}
    - name: proxy
      hostPath:
        path: __PROXY_PATH__
        type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
