# Lightweight Postgres for per-run test namespaces.
# Boots in ~3-5s (vs 30-60s for CNPG operator).
# The platform user gets CREATEDB via post-deploy script.
apiVersion: v1
kind: Pod
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  securityContext:
    fsGroup: 70
  initContainers:
    - name: gen-certs
      image: postgres:16-alpine
      command: ["sh", "-c"]
      args:
        - |
          set -e
          echo "[gen-certs] installing openssl..."
          apk add --no-cache openssl
          echo "[gen-certs] generating self-signed cert..."
          openssl req -new -x509 -days 365 -nodes \
            -out /certs/server.crt -keyout /certs/server.key \
            -subj "/CN=postgres"
          chown 70:70 /certs/server.crt /certs/server.key
          chmod 600 /certs/server.key
          echo "[gen-certs] done — cert ready"
      volumeMounts:
        - name: certs
          mountPath: /certs
  containers:
    - name: postgres
      image: postgres:16-alpine
      args: ["-c", "max_connections=300", "-c", "ssl=on", "-c", "ssl_cert_file=/certs/server.crt", "-c", "ssl_key_file=/certs/server.key"]
      env:
        - name: POSTGRES_USER
          value: platform
        - name: POSTGRES_PASSWORD
          value: dev
        - name: POSTGRES_DB
          value: platform_dev
      ports:
        - containerPort: 5432
      readinessProbe:
        exec:
          command: ["pg_isready", "-U", "platform", "-d", "platform_dev"]
        initialDelaySeconds: 10
        periodSeconds: 2
      volumeMounts:
        - name: certs
          mountPath: /certs
          readOnly: true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
  volumes:
    - name: certs
      emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
