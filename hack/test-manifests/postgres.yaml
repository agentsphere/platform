# Lightweight Postgres for per-run test namespaces.
# Boots in ~3-5s (vs 30-60s for CNPG operator).
# The platform user gets CREATEDB via post-deploy script.
# Process-wrapper proxy provides metrics scraping + log capture.
apiVersion: v1
kind: Pod
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  securityContext:
    fsGroup: 70
  initContainers:
    - name: gen-certs
      image: postgres:16-alpine
      command: ["sh", "-c"]
      args:
        - |
          set -e
          apk add --no-cache openssl
          openssl req -new -x509 -days 365 -nodes \
            -out /certs/server.crt -keyout /certs/server.key \
            -subj "/CN=postgres"
          chown 70:70 /certs/server.crt /certs/server.key
          chmod 600 /certs/server.key
      volumeMounts:
        - name: certs
          mountPath: /certs
  containers:
    - name: postgres
      image: postgres:16-alpine
      command: ["/proxy/platform-proxy"]
      args:
        - "--wrap"
        - "--tcp-ports=5432"
        - "--scrape-type=postgres"
        - "--"
        - "postgres"
        - "-c"
        - "max_connections=300"
        - "-c"
        - "ssl=on"
        - "-c"
        - "ssl_cert_file=/certs/server.crt"
        - "-c"
        - "ssl_key_file=/certs/server.key"
      env:
        - name: POSTGRES_USER
          value: platform
        - name: POSTGRES_PASSWORD
          value: dev
        - name: POSTGRES_DB
          value: platform_dev
        - name: PLATFORM_API_URL
          value: "__PLATFORM_API_URL__"
        - name: PLATFORM_API_TOKEN
          value: "plat_api_otel_system_dev_000000000000000000000000000000"
        - name: PLATFORM_SERVICE_NAME
          value: platform-postgres
        - name: PROXY_SCRAPE_POSTGRES_URL
          value: "postgres://platform:dev@localhost:5432/platform_dev"
        - name: PROXY_HEALTH_PORT
          value: "15020"
      ports:
        - containerPort: 5432
        - containerPort: 15020
      readinessProbe:
        httpGet:
          path: /readyz
          port: 15020
        initialDelaySeconds: 10
        periodSeconds: 2
      volumeMounts:
        - name: certs
          mountPath: /certs
          readOnly: true
        - name: proxy
          mountPath: /proxy
          readOnly: true
      resources:
        requests:
          cpu: 100m
          memory: 160Mi
        limits:
          memory: 544Mi
  volumes:
    - name: certs
      emptyDir: {}
    - name: proxy
      hostPath:
        path: __PROXY_PATH__
        type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
