apiVersion: v1
kind: ConfigMap
metadata:
  name: preview-proxy-config
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 128; }
    http {
      resolver kube-dns.kube-system.svc.cluster.local valid=5s;
      server {
        listen 8080;
        # Port-aware format: /{service}.{namespace}.{port}/{path}
        location ~ ^/([^./]+)\.([^./]+)\.([0-9]+)/(.*)$ {
          set $target_svc $1;
          set $target_ns  $2;
          set $target_port $3;
          set $target_path $4;
          proxy_pass http://$target_svc.$target_ns.svc.cluster.local:$target_port/$target_path$is_args$args;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 120s;
          proxy_connect_timeout 5s;
        }
        # Legacy format: /{service}.{namespace}/{path} (default port 8000)
        location ~ ^/([^./]+)\.([^./]+)/(.*)$ {
          set $target_svc $1;
          set $target_ns  $2;
          set $target_path $3;
          proxy_pass http://$target_svc.$target_ns.svc.cluster.local:8000/$target_path$is_args$args;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 120s;
          proxy_connect_timeout 5s;
        }
        # Health check
        location = /healthz {
          return 200 "ok";
        }
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: preview-proxy
  labels:
    app: preview-proxy
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 2
        periodSeconds: 5
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 64Mi
  volumes:
    - name: config
      configMap:
        name: preview-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: preview-proxy
spec:
  type: NodePort
  selector:
    app: preview-proxy
  ports:
    - port: 8080
      targetPort: 8080
