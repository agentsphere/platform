# Lightweight Valkey (Redis-compatible) for per-run test namespaces.
# Process-wrapper proxy provides metrics scraping + log capture.
apiVersion: v1
kind: Pod
metadata:
  name: valkey
  labels:
    app: valkey
spec:
  containers:
    - name: valkey
      image: valkey/valkey:8-alpine
      command: ["/proxy/platform-proxy"]
      args:
        - "--wrap"
        - "--tcp-ports=6379"
        - "--scrape-type=redis"
        - "--"
        - "valkey-server"
        - "--save"
        - ""
        - "--appendonly"
        - "no"
        - "--requirepass"
        - "dev"
      env:
        - name: PLATFORM_API_URL
          value: "__PLATFORM_API_URL__"
        - name: PLATFORM_API_TOKEN
          value: "plat_api_otel_system_dev_000000000000000000000000000000"
        - name: PLATFORM_SERVICE_NAME
          value: platform-valkey
        - name: PROXY_SCRAPE_REDIS_URL
          value: "redis://:dev@localhost:6379"
        - name: PROXY_HEALTH_PORT
          value: "15020"
      ports:
        - containerPort: 6379
        - containerPort: 15020
      readinessProbe:
        httpGet:
          path: /readyz
          port: 15020
        initialDelaySeconds: 1
        periodSeconds: 1
      volumeMounts:
        - name: proxy
          mountPath: /proxy
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 96Mi
        limits:
          memory: 544Mi
  volumes:
    - name: proxy
      hostPath:
        path: __PROXY_PATH__
        type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
spec:
  type: NodePort
  selector:
    app: valkey
  ports:
    - port: 6379
      targetPort: 6379
