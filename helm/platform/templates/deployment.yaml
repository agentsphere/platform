apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.platform.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.platform.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "platform.selectorLabels" . | nindent 8 }}
        {{- with .Values.platform.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "platform.serviceAccountName" . }}
      {{- with .Values.platform.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: {{ .Values.platform.securityContext.runAsUser | default 1000 }}
        runAsGroup: {{ .Values.platform.securityContext.runAsGroup | default 1000 }}
        fsGroup: {{ .Values.platform.securityContext.fsGroup | default 1000 }}
      initContainers:
        - name: init-data
          securityContext:
            runAsUser: 0
          image: "{{ .Values.platform.image.repository }}:{{ .Values.platform.image.tag }}"
          imagePullPolicy: {{ .Values.platform.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              # Copy default data files to PVC (no-clobber).
              # The platform image ships agent-runner binaries, MCP tarball, and
              # seed images under /data. We rsync them into the PVC so the main
              # container picks them up without re-downloading on restart.
              for src in /data/*; do
                name="$(basename "$src")"
                dst="/mnt/data/$name"
                if [ ! -e "$dst" ]; then
                  cp -a "$src" "$dst"
                  echo "copied $name"
                fi
              done
              echo "init-data complete"
          volumeMounts:
            - name: data
              mountPath: /mnt/data
      containers:
        - name: platform
          image: "{{ .Values.platform.image.repository }}:{{ .Values.platform.image.tag }}"
          imagePullPolicy: {{ .Values.platform.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "platform.configmapName" . }}
            - secretRef:
                name: {{ include "platform.secretName" . }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.platform.ssh.enabled }}
            - name: ssh
              containerPort: {{ .Values.platform.ssh.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 30
          resources:
            {{- toYaml .Values.platform.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "platform.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.platform.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.platform.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.platform.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
