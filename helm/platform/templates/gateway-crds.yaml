{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: platform
spec:
  controllerName: io.platform/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name | default "platform-gateway" }}
  namespace: {{ .Release.Namespace }}
  labels:
    platform.io/managed-by: platform
spec:
  gatewayClassName: platform
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              platform.io/managed-by: platform
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              platform.io/managed-by: platform
{{- end }}
