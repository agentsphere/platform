{{- $secretName := include "platform.secretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
type: Opaque
data:
  # --- Database URL (includes password) ---
  {{- if .Values.postgresql.enabled }}
  {{- $pgHost := printf "%s-postgresql" .Release.Name }}
  {{- $pgUser := .Values.postgresql.auth.username }}
  {{- $pgDb := .Values.postgresql.auth.database }}
  {{- if .Values.postgresql.auth.password }}
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:5432/%s" $pgUser .Values.postgresql.auth.password $pgHost $pgDb | b64enc | quote }}
  {{- else if and $existingSecret (index $existingSecret.data "DATABASE_URL") }}
  DATABASE_URL: {{ index $existingSecret.data "DATABASE_URL" }}
  {{- else if .Values.postgresql.auth.existingSecret }}
  {{- /* When using existingSecret, the password is injected via env var reference in the deployment */ -}}
  DATABASE_URL: {{ printf "postgres://%s:$(POSTGRES_PASSWORD)@%s:5432/%s" $pgUser $pgHost $pgDb | b64enc | quote }}
  {{- else }}
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:5432/%s" $pgUser (randAlphaNum 32) $pgHost $pgDb | b64enc | quote }}
  {{- end }}
  {{- else }}
  DATABASE_URL: {{ .Values.externalDatabase.url | b64enc | quote }}
  {{- end }}

  # --- MinIO credentials ---
  {{- if .Values.minio.enabled }}
  MINIO_ACCESS_KEY: {{ .Values.minio.auth.rootUser | b64enc | quote }}
  {{- if .Values.minio.auth.rootPassword }}
  MINIO_SECRET_KEY: {{ .Values.minio.auth.rootPassword | b64enc | quote }}
  {{- else if and $existingSecret (index $existingSecret.data "MINIO_SECRET_KEY") }}
  MINIO_SECRET_KEY: {{ index $existingSecret.data "MINIO_SECRET_KEY" }}
  {{- else }}
  MINIO_SECRET_KEY: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- else }}
  MINIO_ACCESS_KEY: {{ .Values.externalMinio.accessKey | b64enc | quote }}
  MINIO_SECRET_KEY: {{ .Values.externalMinio.secretKey | b64enc | quote }}
  {{- end }}

  # --- Master encryption key (AES-256-GCM, 64 hex chars = 32 bytes) ---
  {{- if and $existingSecret (index $existingSecret.data "PLATFORM_MASTER_KEY") }}
  PLATFORM_MASTER_KEY: {{ index $existingSecret.data "PLATFORM_MASTER_KEY" }}
  {{- else }}
  PLATFORM_MASTER_KEY: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}

  # --- SMTP password (optional) ---
  {{- if .Values.platform.smtp.password }}
  PLATFORM_SMTP_PASSWORD: {{ .Values.platform.smtp.password | b64enc | quote }}
  {{- end }}

  # --- Admin password (dev mode only) ---
  {{- if .Values.platform.adminPassword }}
  PLATFORM_ADMIN_PASSWORD: {{ .Values.platform.adminPassword | b64enc | quote }}
  {{- end }}
