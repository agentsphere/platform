# =============================================================================
# Large deployment — high concurrency, production workloads
# Usage: helm install platform ./helm/platform -f helm/platform/values-large.yaml
# =============================================================================

platform:
  replicaCount: 1
  resources:
    requests:
      memory: "4Gi"
      cpu: "2"
    limits:
      memory: "8Gi"
      cpu: "4"
  env:
    pipelineMaxParallel: 8
    maxCliSubprocesses: 50

postgresql:
  primary:
    resources:
      requests:
        memory: "1Gi"
        cpu: "1"
      limits:
        memory: "2Gi"
        cpu: "2"
    persistence:
      size: 50Gi

valkey:
  master:
    resources:
      requests:
        memory: "256Mi"
        cpu: "500m"
      limits:
        memory: "512Mi"
        cpu: "1"
    persistence:
      size: 4Gi

minio:
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1"
  persistence:
    size: 100Gi
