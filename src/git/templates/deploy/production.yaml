# --- Postgres ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ project_name }}-db"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ project_name }}-db"
  template:
    metadata:
      labels:
        app: "{{ project_name }}-db"
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              value: "{{ values.db_password | default('changeme') }}"
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ project_name }}-db"
spec:
  selector:
    app: "{{ project_name }}-db"
  ports:
    - port: 5432
      targetPort: 5432
---
# --- Application ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ project_name }}-app"
spec:
  replicas: {{ values.replicas | default(1) }}
  selector:
    matchLabels:
      app: "{{ project_name }}-app"
  template:
    metadata:
      labels:
        app: "{{ project_name }}-app"
    spec:
      imagePullSecrets:
        - name: platform-registry-pull
      containers:
        - name: app
          image: "{{ image_ref }}"
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "postgresql://app:{{ values.db_password | default('changeme') }}@{{ project_name }}-db:5432/app"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ project_name }}-app"
spec:
  selector:
    app: "{{ project_name }}-app"
  ports:
    - port: 8080
      targetPort: 8080
# --- Canary deployment (uncomment for progressive delivery) ---
# To enable canary deployments, split this into separate files:
#   deploy/deployment-stable.yaml  — uses {{ stable_image | default(image_ref) }}
#   deploy/deployment-canary.yaml  — uses {{ canary_image | default(image_ref) }}
#   deploy/service-stable.yaml     — selects variant: stable
#   deploy/service-canary.yaml     — selects variant: canary
# Then update .platform.yaml with deploy.specs[].type: canary
