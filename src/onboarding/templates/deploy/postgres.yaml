apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ project_name }}-db
  template:
    metadata:
      labels:
        app: {{ project_name }}-db
    spec:
      initContainers:
        - name: gen-certs
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache openssl >/dev/null 2>&1
              openssl req -new -x509 -days 365 -nodes \
                -out /certs/server.crt -keyout /certs/server.key \
                -subj "/CN={{ project_name }}-db"
              chown 70:70 /certs/server.crt /certs/server.key
              chmod 600 /certs/server.key
          volumeMounts:
            - name: certs
              mountPath: /certs
      containers:
        - name: postgres
          image: postgres:16-alpine
          command: ["docker-entrypoint.sh"]
          args: ["postgres", "-c", "ssl=on", "-c", "ssl_cert_file=/certs/server.crt", "-c", "ssl_key_file=/certs/server.key"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              value: changeme
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: certs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ project_name }}-db
spec:
  selector:
    app: {{ project_name }}-db
  ports:
    - port: 5432
      targetPort: 5432
