apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ project_name }}-cache
  template:
    metadata:
      labels:
        app: {{ project_name }}-cache
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ project_name }}-cache
spec:
  selector:
    app: {{ project_name }}-cache
  ports:
    - port: 6379
      targetPort: 6379
