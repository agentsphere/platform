apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ project_name }}-app
  template:
    metadata:
      labels:
        app: {{ project_name }}-app
    spec:
      imagePullSecrets:
        - name: platform-registry-pull
      containers:
        - name: app
          image: {{ app_image | default(image_ref) }}
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "postgresql://app:changeme@{{ project_name }}-db:5432/app"
            - name: OTEL_SDK_DISABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
